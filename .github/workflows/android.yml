name: Android CI / Oto APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4

    - name: Java 11 Kurulumu (Uyumsuzluk Giderildi)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11' # Gradle 7.0.2 ile sorunsuz çalışması için Java 11'e çekildi
        cache: 'gradle'

    - name: Gradle Çalıştırma İzni Ver
      run: chmod +x gradlew

    - name: APK'yı Derle (Build)
      run: ./gradlew assembleDebug

    - name: Üretilen APK'yı GitHub'a Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: yol-takip-apk
        path: app/build/outputs/apk/debug/app-debug.apk
